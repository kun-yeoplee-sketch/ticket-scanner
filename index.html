<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Universal QR Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    @keyframes pulse-border {
      0%, 100% { border-color: rgba(59, 130, 246, 0.4); }
      50% { border-color: rgba(59, 130, 246, 1); }
    }
    .scanner-laser {
      animation: scan-move 2.5s infinite linear;
    }
    @keyframes scan-move {
      0% { top: 5%; }
      50% { top: 95%; }
      100% { top: 5%; }
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-between p-4 selection:bg-blue-500/30">

  <header class="text-center my-4 w-full">
    <h1 class="text-2xl font-bold tracking-wider text-blue-400 uppercase">Gate Operations</h1>
    <p class="text-xs text-gray-400 mt-1">Multi-Spectrum Engine (Supports Inverted Colors)</p>
  </header>

  <main class="relative w-full max-w-md bg-gray-800 rounded-2xl shadow-2xl p-4 border border-gray-700/60 flex flex-col items-center">
    
    <div class="relative w-full aspect-square bg-black rounded-xl overflow-hidden border border-gray-700 shadow-inner" id="viewfinder-frame">
      
      <video id="webcam-video" class="w-full h-full object-cover" playsinline></video>
      
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="w-64 h-64 border-2 border-blue-500 rounded-xl relative opacity-90" style="animation: pulse-border 2s infinite;">
          <div class="scanner-laser absolute left-0 right-0 h-0.5 bg-blue-400 shadow-[0_0_12px_#3b82f6]"></div>
        </div>
      </div>
      
      <div id="loading-overlay" class="absolute inset-0 bg-gray-950/85 flex flex-col items-center justify-center hidden transition-all duration-200">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p id="overlay-text" class="text-xs font-medium text-gray-300 mt-4 tracking-widest uppercase">Processing scan...</p>
      </div>
      
    </div>

    <div id="result-banner" class="w-full mt-4 p-4 rounded-xl text-center font-medium transition-all duration-200 text-sm hidden whitespace-pre-line border">
      </div>

    <div class="w-full mt-4 flex justify-center">
      <button id="toggle-camera-btn" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 active:scale-95 font-semibold text-xs tracking-wider uppercase rounded-xl shadow-lg transition-all cursor-pointer">
        Initialize Lens
      </button>
    </div>

  </main>

  <canvas id="hidden-canvas" class="hidden"></canvas>

  <footer class="text-center text-[10px] text-gray-600 my-4 tracking-wide">
    Main-Thread Video Buffer Processing (v1.4.0)
  </footer>

  <script>
    const video = document.getElementById('webcam-video');
    const canvas = document.getElementById('hidden-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const loadingOverlay = document.getElementById('loading-overlay');
    const overlayText = document.getElementById('overlay-text');
    const resultBanner = document.getElementById('result-banner');
    const toggleBtn = document.getElementById('toggle-camera-btn');

    let stream = null;
    let isScanning = false;
    let lastScanTime = 0;
    const LOOKUP_THROTTLE_MS = 2500; // Limits duplicate sequential processing signals

    // Setup Video Hardware Streaming Feed
    async function startCamera() {
      try {
        showOverlay("Accessing Media...");
        stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        await video.play();
        
        isScanning = true;
        hideOverlay();
        toggleBtn.innerText = "Kill Stream";
        toggleBtn.classList.replace("bg-blue-600", "bg-red-600");
        toggleBtn.classList.replace("hover:bg-blue-500", "hover:bg-red-500");
        
        requestAnimationFrame(scanLoop);
      } catch (err) {
        console.error("Hardware stream exception:", err);
        showResult("Camera initialization failed.\nVerify production security SSL layers (HTTPS) are active.", false);
        hideOverlay();
      }
    }

    function stopCamera() {
      isScanning = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      video.srcObject = null;
      toggleBtn.innerText = "Initialize Lens";
      toggleBtn.classList.replace("bg-red-600", "bg-blue-600");
      toggleBtn.classList.replace("hover:bg-red-500", "hover:bg-blue-500");
    }

    toggleBtn.addEventListener('click', () => {
      if (isScanning) {
        stopCamera();
      } else {
        startCamera();
      }
    });

    // Realtime Evaluation Frame Handler Engine Loop
    function scanLoop() {
      if (!isScanning) return;

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Push incoming video frame to scratch pixel analysis buffer
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
        
        // Execute JSQR Matrix Extraction
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: "attemptBoth" // FORCES evaluating white-on-black AND standard color matrices concurrently
        });

        if (code && code.data) {
          const currentTime = Date.now();
          if (currentTime - lastScanTime > LOOKUP_THROTTLE_MS) {
            lastScanTime = currentTime;
            dispatchPayload(code.data);
          }
        }
      }
      requestAnimationFrame(scanLoop);
    }

    // Pipeline Data to Sheets Instance
    function dispatchPayload(rawToken) {
      isScanning = false; // Pause scanner loop to prevent multi-call queues
      showOverlay("Checking active roster...");
      
      google.script.run
        .withSuccessHandler((serverRes) => {
          showResult(serverRes.message, serverRes.success);
          hideOverlay();
          
          // Cool-down loop release to allow users to verify confirmation messages
          setTimeout(() => {
            isScanning = true;
            requestAnimationFrame(scanLoop);
          }, 2000);
        })
        .withFailureHandler((error) => {
          showResult("Server sync connection timed out.", false);
          hideOverlay();
          
          setTimeout(() => {
            isScanning = true;
            requestAnimationFrame(scanLoop);
          }, 2000);
        })
        .checkInTicket(rawToken);
    }

    function showOverlay(msg) {
      overlayText.innerText = msg;
      loadingOverlay.classList.remove('hidden');
    }

    function hideOverlay() {
      loadingOverlay.classList.add('hidden');
    }

    function showResult(text, isSuccessful) {
      resultBanner.innerText = text;
      resultBanner.classList.remove('hidden', 'bg-green-950/40', 'text-green-400', 'border-green-800/60', 'bg-red-950/40', 'text-red-400', 'border-red-800/60');
      
      if (isSuccessful) {
        resultBanner.classList.add('bg-green-950/40', 'text-green-400', 'border-green-800/60');
      } else {
        resultBanner.classList.add('bg-red-950/40', 'text-red-400', 'border-red-800/60');
      }
    }
  </script>
</body>
</html>
