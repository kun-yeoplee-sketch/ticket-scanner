<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Simple QR Reader</title>
  <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      background-color: #121212;
      color: #ffffff;
      padding: 20px;
      margin: 0;
    }
    .wrapper {
      max-width: 450px;
      margin: 0 auto;
    }
    #reader {
      width: 100%;
      background: #000;
      border: 2px solid #333 !important;
      border-radius: 8px;
      overflow: hidden;
    }
    #reader video {
      width: 100% !important;
      height: auto !important;
      object-fit: cover !important;
    }
    #result-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      word-break: break-all;
      font-size: 1.2rem;
    }
    .label {
      color: #888;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <h2>QR Code Scanner</h2>
    
    <div id="reader"></div>
    
    <div id="result-box">
      <div class="label">Scanned Text Result</div>
      <div id="scanned-text">Waiting for QR code...</div>
    </div>

    <button id="reset-btn" onclick="resetScanner()" style="display: none;">Scan Another Code</button>
  </div>

  <script>
    let html5QrcodeScanner = null;

    window.onload = function() {
      initScanner();
    };

    function initScanner() {
      document.getElementById('scanned-text').innerText = "Waiting for QR code...";
      document.getElementById('reset-btn').style.display = "none";

      html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 15, 
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
          return { width: Math.floor(minEdge * 0.65), height: Math.floor(minEdge * 0.65) };
        },
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
      }, false);
      
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);

      // iOS Safari Fix to force inline rendering without full-screen hijacking
      const observer = new MutationObserver(() => {
        const iosVideo = document.querySelector('#reader video');
        if (iosVideo) {
          iosVideo.setAttribute('playsinline', 'true');
          iosVideo.setAttribute('webkit-playsinline', 'true');
          iosVideo.setAttribute('muted', 'true');
          iosVideo.play().catch(() => {});
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('reader'), { childList: true, subtree: true });
    }

    function onScanSuccess(decodedText) {
      // 1. Instantly print the raw scanned content onto the web page
      document.getElementById('scanned-text').innerText = decodedText;
      
      // 2. Show the reset button
      document.getElementById('reset-btn').style.display = "inline-block";
      
      // 3. Stop the camera feed so it freezes on the captured scan
      if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(() => {});
      }
    }

    function onScanFailure(error) {
      // Direct pass-through for performance frames
    }

    function resetScanner() {
      initScanner();
    }
  </script>

</body>
</html>
