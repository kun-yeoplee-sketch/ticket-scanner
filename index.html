<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { padding: 20px; text-align: center; background-color: #1e1e24; color: #fff; font-family: system-ui, sans-serif; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: #2a2a35; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); margin-top: 30px; }
    input { background-color: #373746 !important; color: white !important; border: 1px solid #555 !important; }
    button { background-color: #007bff; border: none; font-weight: bold; }
    button:hover { background-color: #0056b3; }
    
    #scanner-view { display: none; }
    #reader { 
      width: 100%; max-width: 450px; aspect-ratio: 1 / 1; margin: 0 auto 15px auto; 
      border: 3px solid #333 !important; border-radius: 8px; background: #000; overflow: hidden;
    }
    
    #ticket-info-box { background: #2a2a35; padding: 20px; border-radius: 8px; text-align: left; margin: 15px 0; display: none; border: 1px solid #444; }
    .submit-btn { font-size: 1.1rem; font-weight: bold; padding: 12px; margin-top: 10px; width: 100%; background-color: #0088cc; border: none; color: white; border-radius: 6px; text-align: center; display: block; }
    .submit-btn:hover { background-color: #006699; }
    .cancel-btn { font-size: 1.1rem; font-weight: bold; padding: 12px; margin-top: 15px; width: 100%; background-color: #424250; border: 1px solid #666; color: #ff5555; border-radius: 6px; text-align: center; display: block; }
    .cancel-btn:hover { background-color: #333340; }
    .confirm-btn { font-size: 1.2rem; font-weight: bold; padding: 14px; margin-top: 10px; width: 100%; background-color: #2e7d32; border: none; color: white; border-radius: 6px; display: block; }
    .confirm-btn:hover { background-color: #1b5e20; }
    .back-btn { font-size: 1.1rem; font-weight: bold; padding: 12px; margin-top: 10px; width: 100%; background-color: #616161; border: none; color: white; border-radius: 6px; display: block; }
    .back-btn:hover { background-color: #424242; }
    #status-banner { padding: 15px; font-weight: bold; border-radius: 6px; font-size: 1.2rem; margin: 15px 0; display: none; white-space: pre-line; }
    .bg-success { background-color: #2e7d32 !important; color: white; }
    .bg-error { background-color: #c62828 !important; color: white; }
    .bg-info { background-color: #1565c0 !important; color: white; }
    ul { list-style-type: none; padding-left: 0; margin-bottom: 15px; }
    li { margin-bottom: 6px; border-bottom: 1px solid #3a3a4a; padding-bottom: 6px; font-size: 1.05rem; }
    .history-log-title { font-weight: bold; margin-top: 20px; margin-bottom: 5px; color: #aaa; font-size: 0.95rem; }
    .history-log-container { font-size: 0.9rem; line-height: 1.4; background: #1a1a22; padding: 12px; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; color: #ffcc77; white-space: pre-line; }
    .top-logo { max-width: 220px; width: 100%; height: auto; margin: 0 auto 20px auto; display: block; background: #ffffff; padding: 10px; border-radius: 8px; }
    .child-top-logo { max-width: 180px; width: 100%; height: auto; margin: 0 auto 15px auto; display: block; background: #ffffff; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <main class="container">
    <div id="home-view" class="card">
      <img src="https://www.rangitoto.school.nz/app/uploads/2021/05/logo-dark.png" class="top-logo" alt="Rangitoto Logo">
      <h3 id="portal-title">Rangitoto Ticket Scanner</h3>
      <label for="usher-name" style="text-align: left; display: block; font-weight: bold;">Scanner Name</label>
      <input type="text" id="usher-name" placeholder="e.g., Sarah - Gate A">
      <button onclick="switchViewToScanner()" style="width: 100%; margin-top: 10px; font-size: 1.1rem; padding: 12px;">Open Ticket Camera</button>
    </div>

    <div id="scanner-view">
      <img src="https://www.rangitoto.school.nz/app/uploads/2021/05/logo-dark.png" class="child-top-logo" alt="Rangitoto Logo">
      <h4 id="child-header-title">Live Scanner</h4>
      <p style="font-size: 0.85rem; color: #aaa; margin-top: -10px;">Scanner: <strong id="active-scanner-label" style="color:#00ff66;">Unknown</strong></p>
      <div id="reader"></div>
      <div id="status-banner"></div>
      <div id="ticket-info-box">
        <h4 id="box-header" style="text-align: center; color: #00d2ff; margin-bottom: 15px;">Ticket Details</h4>
        <div id="dynamic-metadata"></div>
        <hr style="margin: 15px 0;">
        <div id="button-container"></div>
      </div>
      <button id="close-scanner-btn" class="cancel-btn" onclick="switchViewToHome()">Exit Camera</button>
    </div>
  </main>

  <script>
    let html5QrCode = null;
    let isCameraPaused = false;
    let activeTicket = null;
    let googleWebAppUrl = "";

    window.onload = function() {
      // DYNAMIC DECODE: Grabs your unique Google Sheet deployment ID straight from your website link parameters!
      const urlParams = new URLSearchParams(window.location.search);
      const backendId = urlParams.get('backend');
      
      if (!backendId) {
        showBanner("CRITICAL ERROR:\nMissing configuration ID in your web link.\nFormat should be: your-app.vercel.app?backend=ID", "bg-error");
        document.getElementById('home-view').style.display = "none";
        return;
      }
      // Reconstructs the exact destination path dynamically
      googleWebAppUrl = "https://script.google.com/macros/s/" + backendId + "/exec";

      let savedUsher = localStorage.getItem('concert_usher_name');
      if (savedUsher) { document.getElementById('usher-name').value = savedUsher; }
    };

    function switchViewToScanner() {
      let usherName = document.getElementById('usher-name').value.trim();
      if (!usherName) { alert("Please enter a scanner name before starting!"); return; }
      localStorage.setItem('concert_usher_name', usherName);
      document.getElementById('active-scanner-label').innerText = usherName;
      document.getElementById('home-view').style.display = "none";
      document.getElementById('scanner-view').style.display = "block";
      initScanner();
    }

    function switchViewToHome() {
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => { proceedToHomeLayout(); }).catch(() => { proceedToHomeLayout(); });
      } else { proceedToHomeLayout(); }
    }
    function proceedToHomeLayout() {
      document.getElementById('scanner-view').style.display = "none";
      document.getElementById('home-view').style.display = "block";
    }

    function initScanner() {
      isCameraPaused = false;
      activeTicket = null;
      document.getElementById('ticket-info-box').style.display = "none";
      hideBanner();

      html5QrCode = new Html5Qrcode("reader");
      const config = {
        fps: 8, qrbox: 250, aspectRatio: 1.0,
        videoConstraints: { width: { ideal: 1280 }, height: { ideal: 720 } }
      };

      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => { showBanner("Camera Error: " + err, "bg-error"); });
    }

    function onScanSuccess(decodedText) {
      if (isCameraPaused) return;
      isCameraPaused = true;
      html5QrCode.stop().then(() => { executeDatabaseLookup(decodedText); }).catch(() => { executeDatabaseLookup(decodedText); });
    }

    function executeDatabaseLookup(ticketCode) {
      document.getElementById('ticket-info-box').style.display = "none";
      showBanner("Verifying with Google Sheets...", "bg-info");

      // Secure external bridge execution replacing google.script.run
      fetch(googleWebAppUrl, {
        method: "POST",
        mode: "no-cors", // Bypasses CORS browser preflight freezes safely
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "check", ticketId: ticketCode })
      })
      .then(() => {
        // Since no-cors hides response readings, we use a minor helper trick:
        // Re-pinging using standard stream fetches cleanly
        fetch(googleWebAppUrl + "?ticketId=" + encodeURIComponent(ticketCode) + "&action=check")
          .then(res => res.json())
          .then(handleDataResponse)
          .catch(err => { showManualAlert("Network parsing fault: " + err.message, false); });
      })
      .catch(err => { showManualAlert("Database connection error: " + err.message, false); });
    }

    function handleDataResponse(response) {
      if (response.status === 'valid') {
        hideBanner(); activeTicket = response; renderSelectionUI(response);
      } else if (response.status === 'empty') {
        hideBanner(); renderEmptyHistoryUI(response);
      } else if (response.status === 'invalid') {
        hideBanner(); renderInvalidTicketUI(response.message);
      } else {
        showBanner(response.message, "bg-error"); resetScannerOrClose(4000);
      }
    }

    function formatMetadataValue(val) {
      if (val === undefined || val === null) return '';
      return val.toString().replace(/\\n/g, '<br>').replace(/\\r/g, '');
    }

    function renderSelectionUI(data) {
      document.getElementById('close-scanner-btn').style.display = "none";
      let htmlPayload = "<ul>";
      for (let k = 0; k < data.details.length; k++) {
        htmlPayload += '<li><strong>' + data.details[k].label + ':</strong><br>' + formatMetadataValue(data.details[k].value) + '</li>';
      }
      htmlPayload += '<li><strong>Remaining Seats:</strong> <span style="color:#00ff66; font-weight:bold;">' + data.remaining + '</span> / ' + data.totalSeats + '</li></ul>';
      
      if (data.historyLog && data.historyLog.trim() !== '') {
        htmlPayload += '<p class="history-log-title">⚠️ Prior Arrivals On This Ticket:</p><div class="history-log-container">' + data.historyLog.replace(/\\n/g, '<br>') + '</div>';
      }

      document.getElementById('dynamic-metadata').innerHTML = htmlPayload;
      let btnContainer = document.getElementById('button-container');
      btnContainer.innerHTML = '<p style="text-align: center; font-size:1.1rem; font-weight: bold; color: #ff9800; margin-bottom:10px;">Select size entering:</p>';
      
      for (let num = 1; num <= data.remaining; num++) {
        let btn = document.createElement('button');
        btn.className = "submit-btn"; btn.innerText = "Admit " + num;
        btn.onclick = function() { renderConfirmationUI(num); };
        btnContainer.appendChild(btn);
      }

      let cancelBtn = document.createElement('button');
      cancelBtn.className = "cancel-btn"; cancelBtn.innerText = "Cancel & Scan Next";
      cancelBtn.onclick = function() { resetScannerOrClose(0); };
      btnContainer.appendChild(cancelBtn);
      document.getElementById('ticket-info-box').style.display = "block";
    }

    function renderEmptyHistoryUI(data) {
      document.getElementById('close-scanner-btn').style.display = "none";
      let htmlPayload = "<ul>";
      for (let k = 0; k < data.details.length; k++) {
        htmlPayload += '<li><strong>' + data.details[k].label + ':</strong><br>' + formatMetadataValue(data.details[k].value) + '</li>';
      }
      htmlPayload += '<li><strong>Remaining Seats:</strong> <span style="color:#ff5555; font-weight:bold;">0</span> / ' + data.totalSeats + '</li></ul>';
      htmlPayload += '<div style="background-color: #3d2424; padding: 12px; border-radius:6px; border-left:4px solid #ff5555; margin:15px 0; color:#ffcccc;"><strong>Fully Checked-In.</strong></div>';
      htmlPayload += '<p style="font-weight:bold; color:#aaa; font-size:0.9rem;">Log details:</p><div style="font-size:0.9rem; background:#1a1a22; padding:10px; border-radius:6px; color:#ffcccc;">' + data.message.replace(/\\n/g, '<br>') + '</div>';

      document.getElementById('dynamic-metadata').innerHTML = htmlPayload;
      let btnContainer = document.getElementById('button-container'); btnContainer.innerHTML = '';
      let backBtn = document.createElement('button');
      backBtn.className = "back-btn"; backBtn.style.backgroundColor = "#007bff"; backBtn.innerText = "Scan Next Ticket";
      backBtn.onclick = function() { resetScannerOrClose(0); };
      btnContainer.appendChild(backBtn);
      document.getElementById('ticket-info-box').style.display = "block";
    }

    function renderInvalidTicketUI(errorMessage) {
      document.getElementById('close-scanner-btn').style.display = "none";
      document.getElementById('dynamic-metadata').innerHTML = '<div style="background-color: #3d2424; padding: 15px; border-radius:6px; border-left:4px solid #ff5555; color:#ffcccc; text-align:left;"><strong>UNRECOGNIZED CODE</strong><br>' + errorMessage + '</div>';
      let btnContainer = document.getElementById('button-container'); btnContainer.innerHTML = '';
      let backBtn = document.createElement('button');
      backBtn.className = "back-btn"; backBtn.style.backgroundColor = "#007bff"; backBtn.innerText = "Scan Next Ticket";
      backBtn.onclick = function() { resetScannerOrClose(0); };
      btnContainer.appendChild(backBtn);
      document.getElementById('ticket-info-box').style.display = "block";
    }

    function renderConfirmationUI(count) {
      let btnContainer = document.getElementById('button-container');
      let confirmHTML = '<div style="text-align:center; padding:12px; background:#3a3a4a; border-radius:8px; border:2px solid #ff9800; margin-bottom:15px;"><p style="margin:0; font-size:1.15rem;">Admit <strong>' + count + '</strong> seat(s)?</p></div>';
      confirmHTML += '<button id="real-submit-btn" class="confirm-btn">Yes, Confirm Entry</button>';
      confirmHTML += '<button id="back-btn" class="back-btn">Go Back</button>';
      btnContainer.innerHTML = confirmHTML;

      document.getElementById('real-submit-btn').onclick = function() {
        document.getElementById('ticket-info-box').style.display = "none";
        showBanner("Writing check-in to Google Sheets database...", "bg-info");

        let currentUsher = document.getElementById('usher-name').value.trim() || "Unknown Scanner";
        let postPayload = {
          action: "admit", ticketId: activeTicket.ticketId, rowIndex: activeTicket.rowIndex,
          count: count, usherName: currentUsher, ticketSummary: activeTicket.ticketSummary
        };

        fetch(googleWebAppUrl, {
          method: "POST", mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(postPayload)
        })
        .then(() => { showManualAlert("Admission logged successfully!", true); })
        .catch(err => { showManualAlert("Write failure: " + err.message, false); });
      };

      document.getElementById('back-btn').onclick = function() { renderSelectionUI(activeTicket); };
    }

    function showBanner(text, cssClass) { let b = document.getElementById('status-banner'); b.className = cssClass; b.innerText = text; b.style.display = "block"; }
    function hideBanner() { document.getElementById('status-banner').style.display = "none"; }
    function showManualAlert(msg, isSuccess) { showBanner(msg, isSuccess ? "bg-success" : "bg-error"); resetScannerOrClose(3000); }
    
    function resetScannerOrClose(delay) {
      setTimeout(() => {
        hideBanner();
        document.getElementById('ticket-info-box').style.display = "none";
        document.getElementById('close-scanner-btn').style.display = "block";
        initScanner();
      }, delay);
    }
  </script>
</body>
</html>
