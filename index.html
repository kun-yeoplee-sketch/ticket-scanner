<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        #result-container {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #e0f7fa;
            border: 1px solid #00acc1;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            word-wrap: break-word;
            display: none;
        }
        #result-text {
            font-weight: bold;
            color: #006064;
        }
    </style>
</head>
<body>

    <h1>Web QR Code Scanner</h1>
    
    <div id="reader"></div>

    <div id="result-container" id="result-box">
        <h3>Scanned Result:</h3>
        <p id="result-text">Waiting for scan...</p>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // This function triggers when a QR code is successfully scanned
            console.log(`Code matched = ${decodedText}`, decodedResult);
            
            // Display the result container and update the text
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('result-text').innerText = decodedText;
            
            // Optional: Vibrate the device slightly if supported (cool UX touch)
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }
        }

        function onScanFailure(error) {
            // This triggers constantly while looking for a QR code. 
            // We leave it empty to avoid spamming the console.
        }

        // Initialize the HTML5 QR Code Scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10,       // Scans 10 frames per second
                qrbox: { width: 250, height: 250 } // Sets the scanning UI box size
            }, 
            /* verbose= */ false
        );
        
        // Start the scanner
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
