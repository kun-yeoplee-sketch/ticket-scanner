<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>High-Res QR Reader</title>
  <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      background-color: #121212;
      color: #ffffff;
      padding: 20px;
      margin: 0;
    }
    .wrapper {
      max-width: 640px; /* Widened to account for desktop camera layouts */
      margin: 0 auto;
    }
    #reader {
      width: 100%;
      background: #000;
      border: 2px solid #333 !important;
      border-radius: 8px;
      overflow: hidden;
    }
    #reader video {
      width: 100% !important;
      height: auto !important;
    }
    #result-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      word-break: break-all;
      font-size: 1.2rem;
    }
    .label {
      color: #888;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <h2>QR Code Scanner (Desktop Optimized)</h2>
    
    <div id="reader"></div>
    
    <div id="result-box">
      <div class="label">Scanned Text Result</div>
      <div id="scanned-text">Waiting for QR code...</div>
    </div>

    <button id="reset-btn" onclick="resetScanner()" style="display: none;">Scan Another Code</button>
  </div>

  <script>
    let html5QrcodeScanner = null;

    window.onload = function() {
      initScanner();
    };

    function initScanner() {
      document.getElementById('scanned-text').innerText = "Waiting for QR code...";
      document.getElementById('reset-btn').style.display = "none";

      // Rebuilt using the low-level experimental config architecture to force desktop hardware settings
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 20, // Bumbed up frame parsing cadence 
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
          // Expanded target window to 80% to read smaller codes further back
          return { width: Math.floor(minEdge * 0.80), height: Math.floor(minEdge * 0.80) };
        },
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
        // Force high-definition constraint pipeline over web media parameters
        videoConstraints: {
          width: { min: 640, ideal: 1280, max: 1920 },
          height: { min: 480, ideal: 720, max: 1080 },
          facingMode: "environment"
        }
      }, false);
      
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);

      // Mutation Observer remains active to support iOS deployments cleanly
      const observer = new MutationObserver(() => {
        const iosVideo = document.querySelector('#reader video');
        if (iosVideo) {
          iosVideo.setAttribute('playsinline', 'true');
          iosVideo.setAttribute('webkit-playsinline', 'true');
          iosVideo.setAttribute('muted', 'true');
          iosVideo.play().catch(() => {});
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('reader'), { childList: true, subtree: true });
    }

    function onScanSuccess(decodedText) {
      document.getElementById('scanned-text').innerText = decodedText;
      document.getElementById('reset-btn').style.display = "inline-block";
      
      if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(() => {});
      }
    }

    function onScanFailure(error) {
      // Clean performance frame loop bypass
    }

    function resetScanner() {
      initScanner();
    }
  </script>

</body>
</html>
