<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static QR File Reader Test</title>
  <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      background-color: #121212;
      color: #ffffff;
      padding: 40px 20px;
      margin: 0;
    }
    .wrapper {
      max-width: 500px;
      margin: 0 auto;
      background-color: #1e1e1e;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #333;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    input[type="file"] {
      display: none;
    }
    .file-upload-btn {
      display: inline-block;
      padding: 14px 24px;
      background-color: #007bff;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin: 20px 0;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .file-upload-btn:hover {
      background-color: #0056b3;
    }
    #result-box {
      margin-top: 25px;
      padding: 20px;
      background-color: #262626;
      border-radius: 6px;
      border: 1px solid #444;
      word-break: break-all;
    }
    #scanned-text {
      font-size: 1.3rem;
      font-weight: bold;
      color: #00ff66;
      margin-top: 10px;
    }
    .label {
      color: #aaa;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #error-text {
      color: #ff5555;
      font-size: 0.95rem;
      margin-top: 10px;
      display: none;
      background: #3d2424;
      padding: 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <h2>QR Static Image Tester</h2>
    <p style="color: #aaa; font-size: 0.95rem;">Upload a crisp photo of your QR code to test engine capability without webcam stream interference.</p>
    
    <label for="qr-file-input" class="file-upload-btn">
      Choose QR Code Photo
    </label>
    <input type="file" id="qr-file-input" accept="image/*">
    
    <div id="result-box">
      <div class="label">Engine Read Result</div>
      <div id="scanned-text" style="color: #ffaa00;">No file selected yet</div>
      <div id="error-text"></div>
    </div>
  </div>

  <script>
    // Initialize the engine core directly in memory without UI rendering elements
    const html5QrCode = new Html5Qrcode("qr-file-input");

    document.getElementById('qr-file-input').addEventListener('change', e => {
      if (e.target.files.length === 0) return;
      
      const imageFile = e.target.files[0];
      const scannedTextDiv = document.getElementById('scanned-text');
      const errorTextDiv = document.getElementById('error-text');
      
      // Update UI states
      scannedTextDiv.innerText = "Processing image array...";
      scannedTextDiv.style.color = "#ffaa00";
      errorTextDiv.style.display = "none";

      // Feed the raw uncompressed blob file directly to the local parser
      html5QrCode.scanFile(imageFile, true)
        .then(decodedText => {
          // SUCCESS: Clear errors and output the text directly
          scannedTextDiv.innerText = decodedText;
          scannedTextDiv.style.color = "#00ff66";
        })
        .catch(err => {
          // FAILURE: The engine could not mathematically identify the markers
          scannedTextDiv.innerText = "FAILED TO READ";
          scannedTextDiv.style.color = "#ff5555";
          errorTextDiv.innerText = "Engine Error Details: " + err;
          errorTextDiv.style.display = "block";
        });
    });
  </script>

</body>
</html>
